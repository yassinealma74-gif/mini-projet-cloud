<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Cloud Drive</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:Arial,sans-serif;
  background:#f4f7fb;
  color:#1f2937;
}

.login-page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
  linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
  url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop');

  background-size:cover;
  background-position:center;
}

.login-card{
  width:90%;
  max-width:420px;
  padding:40px;
  border-radius:25px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.2);
  box-shadow:0 8px 32px rgba(0,0,0,0.35);
  text-align:center;
  color:white;
}

.login-card h1{
  font-size:32px;
  margin-bottom:10px;
}

.login-card p{
  margin-bottom:25px;
  opacity:0.85;
}

.login-card input{
  width:100%;
  padding:14px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  outline:none;
  background:rgba(255,255,255,0.15);
  color:white;
  font-size:15px;
}

.login-card input::placeholder{
  color:#e5e7eb;
}

button{
  border:none;
  border-radius:12px;
  padding:12px 18px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  transform:translateY(-2px);
}

.primary{
  background:#1a73e8;
  color:white;
}

.secondary{
  background:#ffffff;
  color:#1a73e8;
}

.danger{
  background:#ffebeb;
  color:#d93025;
}

.app{
  display:none;
  min-height:100vh;
}

.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:240px;
  height:100vh;
  background:#0f172a;
  color:white;
  padding:25px;
  box-shadow:4px 0 15px rgba(0,0,0,0.1);
}

.logo{
  font-size:24px;
  font-weight:bold;
  margin-bottom:35px;
  color:#60a5fa;
}

.menu-item{
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  background:rgba(255,255,255,0.06);
  transition:0.3s;
}

.menu-item:hover{
  background:#1a73e8;
}

.main{
  margin-left:240px;
  padding:25px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.search{
  width:45%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:30px;
}

.upload-box{
  margin-top:25px;
  background:white;
  border-radius:20px;
  padding:25px;
  box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.upload-zone{
  border:2px dashed #1a73e8;
  border-radius:18px;
  padding:35px;
  text-align:center;
  background:#f8fbff;
  transition:0.3s;
}

.upload-zone:hover{
  background:#eef5ff;
}

.grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:18px;
}

.file-card{
  background:white;
  border-radius:18px;
  padding:20px;
  box-shadow:0 4px 15px rgba(0,0,0,0.05);
  transition:0.3s;
}

.file-card:hover{
  transform:translateY(-5px);
}

.file-icon{
  font-size:42px;
  margin-bottom:10px;
}

.file-name{
  font-weight:bold;
  margin-bottom:8px;
  word-break:break-word;
}

.file-info{
  color:#6b7280;
  font-size:13px;
  margin-bottom:15px;
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.msg{
  margin-top:15px;
  color:#1a73e8;
  font-weight:bold;
}

@media(max-width:800px){
  .sidebar{
    position:relative;
    width:100%;
    height:auto;
  }

  .main{
    margin-left:0;
  }

  .topbar{
    flex-direction:column;
    gap:12px;
  }

  .search{
    width:100%;
  }
}
</style>
</head>

<body>

<div id="authPage" class="login-page">
  <div class="login-card">
    <h1>🔐 Mini Cloud Drive</h1>
    <p>Connexion sécurisée</p>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">

    <button class="primary" onclick="login()">Se connecter</button>
    <button class="secondary" onclick="signUp()">Créer un compte</button>

    <p id="authMsg"></p>
  </div>
</div>

<div id="appPage" class="app">

  <div class="sidebar">
    <div class="logo">☁️ CloudDrive</div>
    <div class="menu-item">📁 Mes fichiers</div>
    <div class="menu-item">🔒 Espace privé</div>
    <div class="menu-item">☁️ Supabase Storage</div>
  </div>

  <div class="main">

    <div class="topbar">
      <input class="search" id="searchInput" placeholder="Rechercher un fichier..." onkeyup="renderFiles()">

      <div class="user-box">
        <div id="userEmail"></div>
        <button class="danger" onclick="logout()">Déconnexion</button>
      </div>
    </div>

    <div class="upload-box">
      <h2>Uploader un fichier</h2>

      <div class="upload-zone"
           ondragover="event.preventDefault(); this.style.background='#e8f0fe';"
           ondragleave="this.style.background='#f8fbff';"
           ondrop="handleDrop(event)">

        <p>Glisser-déposer un fichier ici ou choisir un fichier</p>
        <input type="file" id="fileInput">
        <button class="primary" onclick="uploadFile()">Upload</button>
        <p id="msg" class="msg"></p>
      </div>
    </div>

    <div class="files-header">
      <h2>Mes fichiers</h2>
      <button class="secondary" onclick="loadFiles()">Actualiser</button>
    </div>

    <div id="fileGrid" class="grid"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://zkykmvylqsaggpxedfzq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpreWttdnlscXNhZ2dweGVkZnpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjkxMDcsImV4cCI6MjA5MjgwNTEwN30.OjjounE02YBPcVvGFb8wTRD7FTzp0-Pcuy06Imz3KIc";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentUser = null;
let filesData = [];

async function signUp(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({ email, password });

  document.getElementById("authMsg").innerHTML =
    error ? "Erreur: " + error.message : "Compte créé ✅ Connecte-toi.";
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if(error){
    document.getElementById("authMsg").innerHTML = "Erreur: " + error.message;
    return;
  }

  currentUser = data.user;
  showApp();
}

async function logout(){
  await supabaseClient.auth.signOut();
  currentUser = null;
  filesData = [];
  document.getElementById("authPage").style.display = "flex";
  document.getElementById("appPage").style.display = "none";
}

async function checkSession(){
  const { data } = await supabaseClient.auth.getSession();

  if(data.session){
    currentUser = data.session.user;
    showApp();
  }
}

function showApp(){
  document.getElementById("authPage").style.display = "none";
  document.getElementById("appPage").style.display = "block";
  document.getElementById("userEmail").innerHTML = "Connecté: " + currentUser.email;
  loadFiles();
}

function handleDrop(event){
  event.preventDefault();
  event.currentTarget.style.background = "#f8fbff";

  const file = event.dataTransfer.files[0];

  if(file){
    document.getElementById("fileInput").files = event.dataTransfer.files;
    uploadFile();
  }
}

async function uploadFile(){
  const file = document.getElementById("fileInput").files[0];
  const msg = document.getElementById("msg");

  if(!file){
    msg.innerHTML = "Veuillez choisir un fichier.";
    return;
  }

  msg.innerHTML = "Upload en cours...";

  const filePath = currentUser.id + "/" + Date.now() + "_" + file.name;

  const { error } = await supabaseClient
    .storage
    .from("files")
    .upload(filePath, file);

  if(error){
    msg.innerHTML = "Erreur upload ❌ " + error.message;
  }else{
    msg.innerHTML = "Upload réussi ✅";
    document.getElementById("fileInput").value = "";
    loadFiles();
  }
}

async function loadFiles(){
  const grid = document.getElementById("fileGrid");
  grid.innerHTML = "Chargement...";

  const { data, error } = await supabaseClient
    .storage
    .from("files")
    .list(currentUser.id);

  if(error){
    grid.innerHTML = "Erreur chargement ❌ " + error.message;
    return;
  }

  filesData = data || [];
  renderFiles();
}

async function renderFiles(){
  const grid = document.getElementById("fileGrid");
  const search = document.getElementById("searchInput").value.toLowerCase();

  const filtered = filesData.filter(file =>
    file.name.toLowerCase().includes(search)
  );

  grid.innerHTML = "";

  if(filtered.length === 0){
    grid.innerHTML = "<p>Aucun fichier trouvé</p>";
    return;
  }

  for(const file of filtered){
    const filePath = currentUser.id + "/" + file.name;

    const { data: signedData } = await supabaseClient
      .storage
      .from("files")
      .createSignedUrl(filePath, 3600);

    const icon = getFileIcon(file.name);
    const sizeKB = file.metadata && file.metadata.size ? (file.metadata.size / 1024).toFixed(1) : "0";
    const date = file.created_at ? new Date(file.created_at).toLocaleDateString() : "-";

    grid.innerHTML += `
      <div class="file-card">
        <div class="file-icon">${icon}</div>
        <div class="file-name">${file.name}</div>
        <div class="file-info">${sizeKB} KB • ${date}</div>

        <div class="actions">
          <a href="${signedData.signedUrl}" download>
            <button class="primary">Download</button>
          </a>

          <a href="${signedData.signedUrl}" target="_blank">
            <button class="secondary">Ouvrir</button>
          </a>

          <button class="danger" onclick="deleteFile('${filePath}')">Supprimer</button>
        </div>
      </div>
    `;
  }
}

function getFileIcon(name){
  const ext = name.split(".").pop().toLowerCase();

  if(["png","jpg","jpeg","gif","webp"].includes(ext)) return "🖼️";
  if(["pdf"].includes(ext)) return "📄";
  if(["doc","docx"].includes(ext)) return "📝";
  if(["xls","xlsx"].includes(ext)) return "📊";
  if(["zip","rar"].includes(ext)) return "🗜️";
  return "📁";
}

async function deleteFile(filePath){
  if(!confirm("Voulez-vous supprimer ce fichier ?")) return;

  const { error } = await supabaseClient
    .storage
    .from("files")
    .remove([filePath]);

  if(error){
    alert("Erreur suppression: " + error.message);
  }else{
    loadFiles();
  }
}

checkSession();
</script>

</body>
</html>
