<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Cloud Drive</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f7fb;
  color:#1f2937;
}

.login-page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.login-card{
  width:90%;
  max-width:420px;
  background:white;
  padding:35px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.25);
  text-align:center;
}

.login-card h1{
  margin-bottom:10px;
}

.login-card input{
  width:100%;
  margin:10px 0;
  padding:14px;
  border:1px solid #ddd;
  border-radius:12px;
}

button{
  border:none;
  border-radius:12px;
  padding:12px 18px;
  cursor:pointer;
  font-weight:bold;
}

.primary{
  background:#1a73e8;
  color:white;
}

.secondary{
  background:#e8f0fe;
  color:#1a73e8;
}

.danger{
  background:#ffe8e8;
  color:#d93025;
}

.app{
  display:none;
  min-height:100vh;
}

.sidebar{
  position:fixed;
  top:0;
  left:0;
  width:230px;
  height:100vh;
  background:#ffffff;
  border-right:1px solid #e5e7eb;
  padding:22px;
}

.logo{
  font-size:22px;
  font-weight:bold;
  margin-bottom:35px;
  color:#1a73e8;
}

.menu-item{
  padding:13px;
  border-radius:12px;
  margin-bottom:8px;
  background:#e8f0fe;
  color:#1a73e8;
  font-weight:bold;
}

.main{
  margin-left:230px;
  padding:25px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:white;
  padding:18px 22px;
  border-radius:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.06);
}

.search{
  width:45%;
  padding:13px;
  border:1px solid #ddd;
  border-radius:30px;
}

.user-box{
  text-align:right;
  font-size:14px;
}

.upload-box{
  margin-top:25px;
  background:white;
  padding:25px;
  border-radius:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.06);
}

.upload-zone{
  border:2px dashed #1a73e8;
  padding:30px;
  border-radius:18px;
  text-align:center;
  background:#f8fbff;
}

.files-header{
  margin-top:30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.grid{
  margin-top:18px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
}

.file-card{
  background:white;
  padding:18px;
  border-radius:18px;
  box-shadow:0 3px 12px rgba(0,0,0,.06);
  transition:.2s;
}

.file-card:hover{
  transform:translateY(-3px);
}

.file-icon{
  font-size:38px;
  margin-bottom:12px;
}

.file-name{
  font-weight:bold;
  word-break:break-word;
  margin-bottom:14px;
}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.actions a{
  text-decoration:none;
}

.msg{
  margin-top:15px;
  font-weight:bold;
  color:#1a73e8;
}

.hidden{display:none}

@media(max-width:800px){
  .sidebar{
    position:relative;
    width:100%;
    height:auto;
  }

  .main{
    margin-left:0;
  }

  .topbar{
    flex-direction:column;
    gap:12px;
  }

  .search{
    width:100%;
  }
}
</style>
</head>

<body>

<div id="authPage" class="login-page">
  <div class="login-card">
    <h1>🔐 Mini Cloud Drive</h1>
    <p>Connexion sécurisée</p>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Mot de passe">

    <button class="primary" onclick="login()">Se connecter</button>
    <button class="secondary" onclick="signUp()">Créer un compte</button>

    <p id="authMsg"></p>
  </div>
</div>

<div id="appPage" class="app">

  <div class="sidebar">
    <div class="logo">☁️ CloudDrive</div>
    <div class="menu-item">📁 Mes fichiers</div>
    <div class="menu-item">🔒 Espace privé</div>
    <div class="menu-item">☁️ Supabase Storage</div>
  </div>

  <div class="main">

    <div class="topbar">
      <input class="search" id="searchInput" placeholder="Rechercher un fichier..." onkeyup="renderFiles()">

      <div class="user-box">
        <div id="userEmail"></div>
        <button class="danger" onclick="logout()">Déconnexion</button>
      </div>
    </div>

    <div class="upload-box">
      <h2>Uploader un fichier</h2>
      <div class="upload-zone">
        <input type="file" id="fileInput">
        <button class="primary" onclick="uploadFile()">Upload</button>
        <p id="msg" class="msg"></p>
      </div>
    </div>

    <div class="files-header">
      <h2>Mes fichiers</h2>
      <button class="secondary" onclick="loadFiles()">Actualiser</button>
    </div>

    <div id="fileGrid" class="grid"></div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://zkykmvylqsaggpxedfzq.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpreWttdnlscXNhZ2dweGVkZnpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMjkxMDcsImV4cCI6MjA5MjgwNTEwN30.OjjounE02YBPcVvGFb8wTRD7FTzp0-Pcuy06Imz3KIc";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentUser = null;
let filesData = [];

async function signUp(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({ email, password });

  document.getElementById("authMsg").innerHTML =
    error ? "Erreur: " + error.message : "Compte créé ✅ Connecte-toi.";
}

async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if(error){
    document.getElementById("authMsg").innerHTML = "Erreur: " + error.message;
    return;
  }

  currentUser = data.user;
  showApp();
}

async function logout(){
  await supabaseClient.auth.signOut();
  currentUser = null;
  filesData = [];
  document.getElementById("authPage").style.display = "flex";
  document.getElementById("appPage").style.display = "none";
}

async function checkSession(){
  const { data } = await supabaseClient.auth.getSession();

  if(data.session){
    currentUser = data.session.user;
    showApp();
  }
}

function showApp(){
  document.getElementById("authPage").style.display = "none";
  document.getElementById("appPage").style.display = "block";
  document.getElementById("userEmail").innerHTML = "Connecté: " + currentUser.email;
  loadFiles();
}

async function uploadFile(){
  const file = document.getElementById("fileInput").files[0];
  const msg = document.getElementById("msg");

  if(!file){
    msg.innerHTML = "Veuillez choisir un fichier.";
    return;
  }

  msg.innerHTML = "Upload en cours...";

  const filePath = currentUser.id + "/" + Date.now() + "_" + file.name;

  const { error } = await supabaseClient
    .storage
    .from("files")
    .upload(filePath, file);

  if(error){
    msg.innerHTML = "Erreur upload ❌ " + error.message;
  }else{
    msg.innerHTML = "Upload réussi ✅";
    document.getElementById("fileInput").value = "";
    loadFiles();
  }
}

async function loadFiles(){
  const grid = document.getElementById("fileGrid");
  grid.innerHTML = "Chargement...";

  const { data, error } = await supabaseClient
    .storage
    .from("files")
    .list(currentUser.id);

  if(error){
    grid.innerHTML = "Erreur chargement ❌ " + error.message;
    return;
  }

  filesData = data || [];
  renderFiles();
}

async function renderFiles(){
  const grid = document.getElementById("fileGrid");
  const search = document.getElementById("searchInput").value.toLowerCase();

  const filtered = filesData.filter(file =>
    file.name.toLowerCase().includes(search)
  );

  grid.innerHTML = "";

  if(filtered.length === 0){
    grid.innerHTML = "<p>Aucun fichier trouvé</p>";
    return;
  }

  for(const file of filtered){
    const filePath = currentUser.id + "/" + file.name;

    const { data: signedData } = await supabaseClient
      .storage
      .from("files")
      .createSignedUrl(filePath, 3600);

    const icon = getFileIcon(file.name);

    grid.innerHTML += `
      <div class="file-card">
        <div class="file-icon">${icon}</div>
        <div class="file-name">${file.name}</div>
        <div class="actions">
          <a href="${signedData.signedUrl}" target="_blank">
            <button class="secondary">Ouvrir</button>
          </a>
          <button class="danger" onclick="deleteFile('${filePath}')">Supprimer</button>
        </div>
      </div>
    `;
  }
}

function getFileIcon(name){
  const ext = name.split(".").pop().toLowerCase();

  if(["png","jpg","jpeg","gif","webp"].includes(ext)) return "🖼️";
  if(["pdf"].includes(ext)) return "📄";
  if(["doc","docx"].includes(ext)) return "📝";
  if(["xls","xlsx"].includes(ext)) return "📊";
  if(["zip","rar"].includes(ext)) return "🗜️";
  return "📁";
}

async function deleteFile(filePath){
  if(!confirm("Voulez-vous supprimer ce fichier ?")) return;

  const { error } = await supabaseClient
    .storage
    .from("files")
    .remove([filePath]);

  if(error){
    alert("Erreur suppression: " + error.message);
  }else{
    loadFiles();
  }
}

checkSession();
</script>

</body>
</html>
