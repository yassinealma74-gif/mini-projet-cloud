<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Cloud Storage</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}
.container{
  margin:60px auto;
  padding:40px;
  width:80%;
  max-width:800px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
}
button{
  padding:10px 20px;
  background:#00c6ff;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
}
ul{list-style:none;}
a{color:#00c6ff;}
</style>
</head>

<body>

<div class="container">

<h1>Mini Cloud Storage</h1>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<p id="msg"></p>

<ul id="list"></ul>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://zkvkmvylqsaggpxedfzz.supabase.co";
const supabaseKey = "sb_publishable_N5LNKFKScb7_8xYB7TpDSg__Zffme8";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function uploadFile(){
  const file = document.getElementById("fileInput").files[0];
  const msg = document.getElementById("msg");

  if(!file){
    msg.innerHTML = "Choisir un fichier";
    return;
  }

  msg.innerHTML = "Uploading...";

  const fileName = Date.now() + "_" + file.name;

  const { error } = await supabase
    .storage
    .from("files")
    .upload(fileName, file);

  if(error){
    msg.innerHTML = "Erreur upload ❌";
    console.log(error);
  }else{
    msg.innerHTML = "Upload réussi ✅";
    loadFiles();
  }
}

async function loadFiles(){
  const { data, error } = await supabase
    .storage
    .from("files")
    .list();

  const list = document.getElementById("list");
  list.innerHTML = "";

  if(error){
    list.innerHTML = "Erreur chargement ❌";
    return;
  }

  data.forEach(file => {
    const url = supabase
      .storage
      .from("files")
      .getPublicUrl(file.name).data.publicUrl;

    list.innerHTML += `<li><a href="${url}" target="_blank">${file.name}</a></li>`;
  });
}

loadFiles();
</script>

</body>
</html>
