<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Projet Cloud</title>
 <p id="heure"></p>

<script>
function afficherHeure(){
let maintenant = new Date();
document.getElementById("heure").innerHTML =
"Heure actuelle : " + maintenant.toLocaleTimeString();
}

setInterval(afficherHeure,1000);
</script>

<style>
 
body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.container{
margin-top:80px;
padding:40px;
width:80%;
max-width:700px;
margin-left:auto;
margin-right:auto;
background:rgba(255,255,255,0.08);
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
font-size:20px;
line-height:1.6;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#00c6ff;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.footer{
margin-top:40px;
font-size:14px;
opacity:0.7;
}
 form{
margin-top:30px;
display:flex;
flex-direction:column;
gap:12px;
}

input, textarea{
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

textarea{
height:100px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
}
 .dashboard{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
}

.card{
background:rgba(255,255,255,0.12);
padding:15px;
border-radius:15px;
}
</style>
</head>

<body>

<div class="container">
<h1>☁️ Mini Projet Cloud</h1>
<p>Développé par Yassine</p>
<p>Site hébergé sur Netlify Cloud</p>
<p>Déploiement automatique depuis GitHub</p>

<a class="btn" href="#contact">Contact</a>

<form id="contact" name="contact" method="POST" data-netlify="true">
  <h2>Contact</h2>

  <input type="text" name="nom" placeholder="Votre nom" required>
  <input type="email" name="email" placeholder="Votre email" required>
  <textarea name="message" placeholder="Votre message" required></textarea>

  <button type="submit">Envoyer</button>
</form>

<div class="footer">
Cloud Computing - 2026
</div>
 <div class="dashboard">
  <div class="card">☁️ Cloud: Netlify</div>
  <div class="card">🔁 Déploiement: Automatique</div>
  <div class="card">💻 Code: GitHub</div>
  <div class="card">🌍 Accès: Public Internet</div>
</div>
</div>
<p id="visites"></p>

<script>
let visites = localStorage.getItem("visites");

if(visites === null){
  visites = 1;
}else{
  visites = Number(visites) + 1;
}

localStorage.setItem("visites", visites);
document.getElementById("visites").innerHTML =
"Nombre de visites sur ce navigateur : " + visites;
</script>
</body>
</html>
