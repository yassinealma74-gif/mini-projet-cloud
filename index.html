 <div class="dashboard">

<p id="visites"></p>

<script>
let visites = localStorage.getItem("visites");

if(visites === null){
  visites = 1;
}else{
  visites = Number(visites) + 1;
}

localStorage.setItem("visites", visites);
document.getElementById("visites").innerHTML =
"Nombre de visites sur ce navigateur : " + visites;
</script>
 <h2>Mini Cloud Storage</h2>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<ul id="fileList"></ul>

<script>
function uploadFile(){
  let input = document.getElementById("fileInput");
  let file = input.files[0];

  if(!file){
    alert("Choisir un fichier !");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e){
    let data = e.target.result;

    let files = JSON.parse(localStorage.getItem("files")) || [];

    files.push({
      name: file.name,
      content: data
    });

    localStorage.setItem("files", JSON.stringify(files));
    afficherFiles();
  };

  reader.readAsDataURL(file);
}

function afficherFiles(){
  let list = document.getElementById("fileList");
  list.innerHTML = "";

  let files = JSON.parse(localStorage.getItem("files")) || [];

  files.forEach(f => {
    let li = document.createElement("li");
    let link = document.createElement("a");

    link.href = f.content;
    link.textContent = f.name;
    link.target = "_blank";

    li.appendChild(link);
    list.appendChild(li);
  });
}

afficherFiles();
</script>
 <h2>Mini Cloud Storage (Supabase)</h2>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<ul id="fileList"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://zkvkmvylqsaggpxedfzz.supabase.co";
const supabaseKey = "PUT_YOUR_KEY_HERE";

const supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function uploadFile(){
  let file = document.getElementById("fileInput").files[0];

  if(!file){
    alert("Choisir un fichier");
    return;
  }

  const { data, error } = await supabase
    .storage
    .from("files")
    .upload(file.name, file);

  if(error){
    alert("Erreur upload");
    console.log(error);
  } else {
    alert("Upload réussi");
    afficherFiles();
  }
}

async function afficherFiles(){
  const { data, error } = await supabase
    .storage
    .from("files")
    .list();

  let list = document.getElementById("fileList");
  list.innerHTML = "";

  data.forEach(file => {
    let li = document.createElement("li");
    let link = document.createElement("a");

    const publicURL = supabase
      .storage
      .from("files")
      .getPublicUrl(file.name).data.publicUrl;

    link.href = publicURL;
    link.textContent = file.name;
    link.target = "_blank";

    li.appendChild(link);
    list.appendChild(li);
  });
}

afficherFiles();
</script>
</body>
