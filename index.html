<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Cloud Storage</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}
.container{
  margin:80px auto;
  padding:40px;
  width:80%;
  max-width:800px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
}
button{
  padding:12px 25px;
  background:#00c6ff;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
ul{list-style:none; padding:0;}
li{margin:10px;}
a{color:#00c6ff; font-weight:bold;}
</style>
</head>

<body>

<div class="container">
  <h1>📁 Mini Cloud Storage</h1>

  <input type="file" id="fileInput">
  <button onclick="uploadFile()">Upload</button>

  <p id="msg"></p>

  <h3>Fichiers stockés dans le Cloud</h3>
  <ul id="list"></ul>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://zkykmvylqsaggpxedfzq.supabase.co"; 
const supabaseKey = "sb_publishable_N5LNKFKScb7_8xYB7TpDSg_-Zfffme8";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

async function uploadFile(){
  const file = document.getElementById("fileInput").files[0];
  const msg = document.getElementById("msg");

  if(!file){
    msg.innerHTML = "Choisir un fichier";
    return;
  }

  msg.innerHTML = "Upload en cours...";

  const fileName = Date.now() + "_" + file.name;

  const { error } = await supabaseClient
    .storage
    .from("files")
    .upload(fileName, file);

  if(error){
    msg.innerHTML = "Erreur upload ❌";
    console.log(error);
  }else{
    msg.innerHTML = "Upload réussi ✅";
    loadFiles();
  }
}

async function loadFiles(){
  const list = document.getElementById("list");
  list.innerHTML = "Chargement...";

  const { data, error } = await supabaseClient
    .storage
    .from("files")
    .list();

  if(error){
    list.innerHTML = "Erreur chargement ❌";
    console.log(error);
    return;
  }

  list.innerHTML = "";

  data.forEach(file => {
    const publicURL = supabaseClient
      .storage
      .from("files")
      .getPublicUrl(file.name).data.publicUrl;

    list.innerHTML += `<li><a href="${publicURL}" target="_blank">${file.name}</a></li>`;
  });
}

loadFiles();
</script>

</body>
</html>
